name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core dependencies
        # Core runtime + test deps are enough to exercise the whole engine;
        # optional integrations (langgraph, qdrant, redis) are not required.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pydantic pandas python-dotenv pytest

      - name: Data bootstrap + integrity check
        run: python scripts/initialize_data.py

      - name: Run tests
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t medsim:ci .
