services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: python run_api.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  ui:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MEDSIM_API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
